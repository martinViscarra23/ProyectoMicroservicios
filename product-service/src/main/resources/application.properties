spring.application.name=product-service
server.port=0
eureka.instance.instance-id=${spring.application.name}:${random.value}

#------------------Eureka config
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=15

#------------------Base de datos
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/project_product_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${SS_USERNAME:root}
spring.datasource.password=${SS_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# -----------------Logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true