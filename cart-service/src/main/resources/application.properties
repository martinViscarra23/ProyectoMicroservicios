spring.application.name=cart-service
server.port=8082

#------------------Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=15

#------------------Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/project_cart_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${SS_USERNAME:root}
spring.datasource.password=${SS_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# -----------------Logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
