spring.application.name=cart-service
server.port=8082

#------------------Eureka config
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=15

#------------------Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

#------------------Circuit Breaker
#Solo abrimos el circuito por errores de red y servidor remoto (5xx)
resilience4j.circuitbreaker.configs.default.ignore-exceptions=com.martinviscarra.microservices.project.cart_service.exception.BusinessRuleException,java.lang.IllegalArgumentException

resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=30s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10

#------------------Retry (Reintentos)
management.health.retries.enabled=true
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=500ms
resilience4j.retry.configs.default.enableExponentialBackoff=true
resilience4j.retry.configs.default.exponentialBackoffMultiplier=2

# Ignoramos Exceptions de reglas de negocio Y cuando el circuito este abierto
resilience4j.retry.configs.default.ignore-exceptions=com.martinviscarra.microservices.project.cart_service.exception.BusinessRuleException,java.lang.IllegalArgumentException,io.github.resilience4j.circuitbreaker.CallNotPermittedException

#------------------Base de datos
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/project_cart_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${SS_USERNAME:root}
spring.datasource.password=${SS_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# -----------------Logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
