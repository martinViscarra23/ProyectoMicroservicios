spring.application.name=cart-service
server.port=8082

#------------------Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=15

#------------------Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

#------------------Circuit Breaker
#Solo abrimos el circuito por errores de red y servidor remoto (5xx)
resilience4j.circuitbreaker.configs.default.record-exceptions=feign.FeignException,feign.RetryableException,java.net.ConnectException,java.util.concurrent.TimeoutException
#resilience4j.circuitbreaker.instances.product-service.record-exceptions=feign.RetryableException,feign.FeignException

resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10

#------------------Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/project_cart_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${SS_USERNAME:root}
spring.datasource.password=${SS_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# -----------------Logs
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
