server:
  port: 443

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false # Apagamos la exposición automática
          routes:
            # --- RUTA DE PRODUCTOS ---
            - id: product-service-route
              uri: lb://PRODUCT-SERVICE # lb:// significa "Load Balancer" (búscalo en Eureka)
              predicates:
                - Path=/api/products/** # Si la URL entrante empieza con esto, entra aqu

            # --- RUTA DE CAARRITOS ---
            - id: cart-service-route
              uri: lb://CART-SERVICE
              predicates:
                - Path=/api/carts/**

           # --- RUTA DE VENTAS ---
            - id: sale-service-route
              uri: lb://SALE-SERVICE
              predicates:
                - Path=/api/sales/**

management:
  endpoints:
    web:
      exposure:
        include: "gateway,health,info"
  endpoint:
    gateway:
      access: read-only

      # http://localhost:443/actuator/gateway/routes para ver las metricas

# Configuración de Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

